<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파일 관리 - 온누리인쇄나라</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-print me-2"></i>온누리인쇄나라 관리자
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin">
                    <i class="fas fa-tachometer-alt me-1"></i>대시보드
                </a>
                <a class="nav-link" href="/admin/portfolio">
                    <i class="fas fa-images me-1"></i>포트폴리오
                </a>
                <a class="nav-link" href="/admin/brochures">
                    <i class="fas fa-file-pdf me-1"></i>리플렛/브로슈어
                </a>
                <a class="nav-link active" href="/admin/files">
                    <i class="fas fa-folder me-1"></i>파일 관리
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>로그아웃
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h2 class="mb-4">
                    <i class="fas fa-folder me-2"></i>업로드된 파일 관리
                </h2>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">
                            <i class="fas fa-file me-2"></i>파일 목록
                        </h5>
                    </div>
                    <div class="card-body">
                        {% if files %}
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>파일명</th>
                                        <th>크기</th>
                                        <th>수정일</th>
                                        <th>작업</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for file in files %}
                                    <tr>
                                        <td>
                                            <i class="fas fa-file me-2"></i>{{ file.name }}
                                        </td>
                                        <td>{{ "%.2f"|format(file.size / 1024 / 1024) }} MB</td>
                                        <td>{{ file.modified }}</td>
                                        <td>
                                            <button class="btn btn-sm btn-outline-danger" onclick="deleteFile('{{ file.name }}')">
                                                <i class="fas fa-trash me-1"></i>삭제
                                            </button>
                                        </td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                        {% else %}
                        <div class="text-center py-5">
                            <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
                            <p class="text-muted">업로드된 파일이 없습니다.</p>
                        </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function deleteFile(filename) {
            if (confirm(`정말로 "${filename}" 파일을 삭제하시겠습니까?`)) {
                try {
                    const response = await fetch('/admin/delete_file', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ filename: filename })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        alert('파일이 삭제되었습니다.');
                        location.reload();
                    } else {
                        alert(result.error || '삭제 중 오류가 발생했습니다.');
                    }
                } catch (error) {
                    console.error('삭제 오류:', error);
                    alert('네트워크 오류가 발생했습니다.');
                }
            }
        }
    </script>
</body>
</html>
